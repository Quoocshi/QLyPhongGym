<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM 666 - Đăng Nhập</title>
    <link rel="stylesheet" th:href="@{/css/log.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <a href="#">GYM 666</a>
                </div>
                <nav>
                    <ul>
                        <li><a href="#">TRANG CHỦ</a></li>
                        <li><a th:href="@{/log&re}" class="active">ĐĂNG NHẬP/ĐĂNG KÝ</a></li>
                        <li><a href="#">DỊCH VỤ</a></li>
                        <li><a href="#">LIÊN HỆ</a></li>
                    </ul>
                </nav>
                <div class="search-container">
                    <input type="text" placeholder="">
                    <button type="submit">🔍</button>
                </div>
            </div>
        </header>

        <main>
            <div class="split-container">
                <div class="image-side">
                    <!-- Background image handled in CSS -->
                </div>
                <div class="login-side">
                    <div class="login-form">
                        <h1>Đăng Nhập</h1>
                        
                        <form th:action="@{/login}" method="post">
                            <div class="form-group">
                                <label for="username">Gmail hoặc Username</label>
                                <input type="text" id="username" name="username" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="password">Mật Khẩu</label>
                                <input type="password" id="password" name="password" required>
                                <div class="forgot-password">
                                    <a href="#">Quên mật khẩu?</a>
                                </div>
                            </div>
                            
                            <button type="submit" class="login-button">Đăng Nhập</button>
                        </form>
                        
                        <div class="alternative-login">
                            <div class="divider">
                                <span>Cách khác</span>
                            </div>
                            
                            <div class="social-login">
                                <a href="#" class="google-login">
                                    <img th:src="@{/images/google.png}" alt="Google">Đăng nhập với Google
                                </a>
                                <a href="#" class="facebook-login">
                                    <img th:src="@{/images/facebook.png}" alt="Facebook">Đăng nhập với Facebook
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
