<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM 666 - Đăng Ký</title>
    <link rel="stylesheet" th:href="@{/css/re.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <a href="#">GYM 666</a>
                </div>
                <nav>
                    <ul>
                        <li><a href="#">TRANG CHỦ</a></li>
                        <li><a href="#" class="active">ĐĂNG NHẬP/ĐĂNG KÝ</a></li>
                        <li><a href="#">DỊCH VỤ</a></li>
                        <li><a href="#">LIÊN HỆ</a></li>
                    </ul>
                </nav>
                <div class="search-container">
                    <input type="text" placeholder="">
                    <button type="submit">🔍</button>
                </div>
            </div>
        </header>

        <main>
            <div class="split-container">
                <div class="image-side">
                    <!-- Background image handled in CSS -->
                </div>
                <div class="register-side">
                    <div class="register-form">
                        <h1>Đăng Ký</h1>
                        
                        <div class="form-group">
                            <label for="fullname">Tên người dùng</label>
                            <input type="text" id="fullname" name="fullname">
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group half">
                                <label for="birthdate">Ngày tháng năm sinh</label>
                                <input type="date" id="birthdate" name="birthdate">
                            </div>
                            <div class="form-group half">
                                <label for="gender">Giới tính</label>
                                <select id="gender" name="gender">
                                    <option value="" selected disabled>Chọn giới tính</option>
                                    <option value="male">Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="username">Tên tài khoản</label>
                            <input type="text" id="username" name="username">
                        </div>
                        
                        <div class="form-group">
                            <label for="email">SĐT/Gmail</label>
                            <input type="email" id="email" name="email">
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Mật Khẩu</label>
                            <input type="password" id="password" name="password">
                        </div>
                        
                        <button class="register-button">Đăng Ký</button>
                        
                        <div class="alternative-login">
                            <div class="divider">
                                <span>Cách khác</span>
                            </div>
                            
                            <div class="social-login">
                                <a href="#" class="google-login">
                                    <img th:src="@{/images/google.png}" alt="Google">Đăng ký với Google
                                </a>
                                <a href="#" class="facebook-login">
                                    <img th:src="@{/images/facebook.png}" alt="Facebook">Đăng ký với Facebook
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
