<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM 666 - Đăng Ký</title>
    <link rel="stylesheet" th:href="@{/css/reg.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <a href="#">GYM 666</a>
                </div>
                <nav>
                    <ul>
                        <li><a href="#">TRANG CHỦ</a></li>
                        <li><a th:href="@{/log&re}" class="active">ĐĂNG NHẬP/ĐĂNG KÝ</a></li>
                        <li><a href="#">DỊCH VỤ</a></li>
                        <li><a href="#">LIÊN HỆ</a></li>
                    </ul>
                </nav>
                <div class="search-container">
                    <input type="text" placeholder="">
                    <button type="submit">🔍</button>
                </div>
            </div>
        </header>

        <main>
            <div class="split-container">
                <div class="image-side">
                    <!-- Background image handled in CSS -->
                </div>
                <div class="register-side">
                    <div class="register-form">
                        <h1>Đăng Ký</h1>
                        
                        <form th:action="@{/register}" method="post" th:object="${account}" onsubmit="return validatePassword()">
                            <div class="form-group">
                                <label for="fullname">Họ và tên</label>
                                <input type="text" th:field="*{fullName}" placeholder="Họ và tên">
                            </div>
                            
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" th:field="*{userName}" placeholder="Tên đăng nhập">
                            </div>
                            
                            <div class="form-group">
                                <label for="email">Gmail</label>
                                <input type="email" th:field="*{email}" placeholder="Email">
                            </div>
                            
                            <div class="form-group">
                                <label for="password">Mật Khẩu</label>
                                <input type="password" th:field="*{passwordHash}" id="password" placeholder="Mật khẩu">
                            </div>

                            <div class="form-group">
                                <label for="confirmPassword">Xác Nhận Mật Khẩu</label>
                                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                                <div id="passwordError" class="error-message" style="display: none; color: red; font-size: 12px; margin-top: 5px;">
                                    Không trùng khớp mật khẩu
                                </div>
                            </div>
                            
                            <button type="submit" class="register-button">Đăng ký</button>
                        </form>
                        
                        <div class="alternative-login">
                            <div class="divider">
                                <span>Cách khác</span>
                            </div>
                            
                            <div class="social-login">
                                <a href="#" class="google-login">
                                    <img th:src="@{/images/google.png}" alt="Google">Đăng ký với Google
                                </a>
                                <a href="#" class="facebook-login">
                                    <img th:src="@{/images/facebook.png}" alt="Facebook">Đăng ký với Facebook
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function validatePassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorElement = document.getElementById('passwordError');

            if (password !== confirmPassword) {
                errorElement.style.display = 'block';
                return false;
            }
            errorElement.style.display = 'none';
            return true;
        }
    </script>
</body>
</html>
